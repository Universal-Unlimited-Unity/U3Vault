version: "3.9"

services:
  backend:
    build: ./backend
    ports: 
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"

  db:
    image: postgres:15
    volumes:
      - db_data:/var/lib/postgresql/data
    env_file:
      - ./backend/.env

volumes:
  db_data: