version: "3.9"

services:

  backend:
    build: ./backend
    ports: 
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=adamaakif
      - POSTGRES_DB=vault
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:

